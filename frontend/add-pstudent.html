<!DOCTYPE html>

<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Add Student Placement | SCIS placements</title>

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
}

/* INPUT STYLE */
.input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  background: #f9fafb;
  transition: 0.2s;
}

.input:focus {
  outline: none;
  border-color: #3b82f6;
  background: #fff;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
}

/* LABEL */
.label {
  font-size: 12px;
  font-weight: 600;
  color: #6b7280;
}
</style>
</head>
<body class="bg-gray-100">
<header class="fixed top-0 w-full z-40 bg-white/80 backdrop-blur shadow-sm px-4 sm:px-6 py-4 flex items-center justify-between">

  <div class="flex items-center gap-4">
    <a href="dashboard.html">
      <span class="material-symbols-outlined text-blue-600 p-2 rounded-xl hover:bg-blue-50 transition">
        arrow_back
      </span>
    </a>

<div class="flex items-center gap-2">
  <span class="material-symbols-outlined text-blue-600">analytics</span>
  <h1 class="text-lg sm:text-xl font-extrabold text-blue-600">
    Placement Intelligence
  </h1>
</div>
  </div>
</header>
<!-- MAIN -->
<main class="pt-24 pb-20 px-4 sm:px-6 max-w-4xl mx-auto">
<!-- TITLE -->
<div class="mb-8 text-center md:text-left">
  <h2 class="text-2xl sm:text-3xl md:text-4xl font-extrabold text-gray-800">
    Add Student Data
  </h2>
  <p class="text-gray-500 text-sm mt-1">
    Enter placement details for tracking
  </p>
</div>

<!-- FORM -->

<form id="jobForm" class="space-y-8">

<!-- CARD -->

<div class="bg-white p-6 sm:p-8 rounded-2xl shadow">

  <h3 class="text-lg sm:text-xl font-bold mb-6">
    Student Placement Details
  </h3>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
<!-- Student Name -->
<div class="sm:col-span-2">
  <label class="label">Student Name</label>
  <input id="student_name" type="text" placeholder="John Doe" class="input">
</div>

<!-- Company -->
<div>
  <label class="label">Company Name</label>
  <input id="company" type="text" placeholder="Google" class="input">
</div>

<!-- Role -->
<div>
  <label class="label">Job Role</label>
  <input id="role" type="text" placeholder="Backend Developer" class="input">
</div>

<!-- Salary -->
<div>
  <label class="label">Salary (LPA)</label>
  <input id="salary" type="number" placeholder="10" class="input">
</div>

<!-- Department -->
<div>
  <label class="label">Department</label>
  <input id="department" type="text" placeholder="CSE" class="input">
</div>
  </div>
</div>

<!-- BUTTON -->

<div class="text-center">
  <button type="submit"
    class="w-full sm:w-auto px-10 py-3 rounded-xl text-white font-semibold
    bg-gradient-to-r from-blue-600 to-blue-400
    hover:scale-[0.98] transition">ADD STUDENT
  </button>
</div>
</form>
</main>

<script>
const form = document.querySelector("form");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    student_name: document.getElementById("student_name").value,
    company_name: document.getElementById("company").value,
    job_role: document.getElementById("role").value,
    salary_lpa: document.getElementById("salary").value,
    department: document.getElementById("department").value
  };

  console.log("Sending:", data);

  const res = await fetch("https://placement-portal-8ey5.onrender.com/students", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const result = await res.json();

  if (result.message) {
    alert("Student data added successfully!");
    form.reset();
  } else {
    alert("Error: " + result.error);
  }
});
</script>

</body>
</html>
