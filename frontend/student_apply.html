<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply Job</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
}

/* INPUT */
.input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  background: #f9fafb;
  transition: 0.2s;
}

.input:focus {
  outline: none;
  border-color: #3b82f6;
  background: #fff;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 18px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}
</style>

</head>

<body class="bg-gray-100">

<!-- HEADER -->

<header class="sticky top-0 bg-white shadow-sm px-4 sm:px-6 py-4 flex items-center gap-3 z-50">
  <button onclick="history.back()" class="text-blue-600 text-xl hover:bg-blue-50 p-2 rounded-lg">
    ←
  </button>
  <h1 class="font-bold text-lg text-blue-600">Apply for Job</h1>
</header>

<!-- MAIN -->

<main class="max-w-3xl mx-auto px-4 sm:px-6 py-8 space-y-6">

  <!-- JOB DETAILS -->

  <div class="card">


<h1 id="jobTitle" class="text-2xl sm:text-3xl font-extrabold text-gray-800"></h1>

<p id="company" class="text-gray-500 mt-2"></p>

<p id="salary" class="text-blue-600 font-semibold mt-2 text-lg"></p>


  </div>

  <!-- FORM -->

  <div class="card">


<h2 class="text-xl font-bold mb-6">Application Form</h2>

<div class="space-y-4">

  <input id="name" placeholder="Full Name" class="input">

  <input id="email" placeholder="Email" class="input">

  <input id="phone" placeholder="Phone Number" class="input">

  <input id="cgpa" placeholder="CGPA" class="input">

  <input id="resume" placeholder="Resume Link" class="input">

  <textarea id="why"
    placeholder="Why are you a good fit?"
    class="input h-28 resize-none"></textarea>

  <!-- BUTTON -->
  <button onclick="applyJob()"
    class="w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white py-3 rounded-xl font-semibold text-lg hover:scale-[0.98] transition">
    Submit Application →
  </button>

</div>


  </div>

</main>
<script>

const jobId = new URLSearchParams(window.location.search).get("job_id");

async function loadJob() {
  const res = await fetch(`https://placement-portal-8ey5.onrender.com/jobs`);
  const jobs = await res.json();

  const job = jobs.find(j => j.id == jobId);

  document.getElementById("jobTitle").innerText = job.job_role;
  document.getElementById("company").innerText = job.company_name;
  document.getElementById("salary").innerText = job.salary_lpa + " LPA";
}
async function applyJob(){
  
  const jobId = new URLSearchParams(window.location.search).get("job_id");

  if (!jobId) {
    alert("Invalid job. Please apply from job list.");
    return;
  }
  const data = {
    job_id: parseInt(jobId),
    student_name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    cgpa: document.getElementById("cgpa").value,
    resume_link: document.getElementById("resume").value
  };

 console.log("Sending:", data); // DEBUG

  const res = await fetch("https://placement-portal-8ey5.onrender.com/apply", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  const result = await res.json();

  console.log("Response:", result);

  if(res.ok){
    alert("Application submitted!");
  } else {
    alert("Error: " + result.error);
  }
}


loadJob();
</script>

</body>
</html>
