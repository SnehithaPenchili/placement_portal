<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumni Directory</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
}

.nav-link {
  color: #64748b;
  transition: 0.3s;
}

.nav-link:hover {
  color: #2563eb;
}

.nav-active {
  color: #2563eb !important;
  border-bottom: 2px solid #2563eb;
}
</style>

</head>

<body class="bg-gray-100">

<!-- NAVBAR -->

<nav class="fixed top-0 w-full z-50 bg-white shadow-sm">
  <div class="flex justify-between items-center px-4 sm:px-6 py-4 max-w-7xl mx-auto">
<h1 class="text-blue-600 font-bold text-lg">SCIS placements</h1>

<div class="hidden md:flex gap-8">
  <a id="nav-home" href="home.html" class="nav-link font-semibold">Home</a>
  <a id="nav-jobs" href="jobs.html" class="nav-link font-semibold">Jobs</a>
  <a id="nav-alumni" href="alumni.html" class="nav-link font-semibold">Alumni</a>
</div>


  </div>
</nav>

<!-- MAIN -->

<main class="pt-24 pb-20 px-4 sm:px-6 max-w-7xl mx-auto">

<!-- HEADER -->

<div class="mb-10 text-center md:text-left">
  <h2 class="text-3xl sm:text-4xl font-extrabold text-gray-800 mb-2">
    Alumni Directory
  </h2>
  <p class="text-gray-500 max-w-xl text-sm sm:text-base">
    Explore successful alumni and their career journeys
  </p>
</div>

<!-- GRID -->

<div id="alumniContainer"
  class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
</div>

</main>

<!-- SCRIPT -->

<script>
async function loadAlumni() {
  try {
    const res = await fetch("https://placement-portal-8ey5.onrender.com/students");
    const data = await res.json();

    displayAlumni(data);

  } catch (err) {
    console.error(err);
  }
}

function displayAlumni(students) {
  const container = document.getElementById("alumniContainer");
  container.innerHTML = "";

  if (students.length === 0) {
    container.innerHTML = `
      <div class="col-span-full text-center text-gray-500 mt-10">
        No alumni data available
      </div>
    `;
    return;
  }

  students.forEach(s => {

    const initials = s.student_name
      .split(" ")
      .map(w => w[0])
      .join("")
      .toUpperCase();

    const card = document.createElement("div");

    card.className = `
      bg-white p-6 rounded-xl shadow hover:shadow-lg
      transition transform hover:-translate-y-1
    `;

    card.innerHTML = `
      <div class="flex justify-between items-start mb-5">

        <div class="flex items-center gap-4">

          <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center font-bold">
            ${initials}
          </div>

          <div>
            <h3 class="font-bold text-gray-800">${s.student_name}</h3>
            <p class="text-sm text-blue-600 font-medium">${s.job_role}</p>
            <p class="text-xs text-gray-500">${s.company_name}</p>
          </div>

        </div>

      </div>

      <div class="flex justify-between items-center border-t pt-4">

        <div>
          <p class="text-xs text-gray-400">Package</p>
          <p class="text-lg font-bold text-green-600">${s.salary_lpa} LPA</p>
        </div>

        <div class="text-xs text-gray-400">
          ${s.department || ""}
        </div>

      </div>
    `;

    container.appendChild(card);
  });
}

loadAlumni();
</script>

<!-- NAV ACTIVE -->

<script>
document.addEventListener("DOMContentLoaded", () => {

  const path = window.location.pathname.split("/").pop();

  if (path === "home.html") {
    document.getElementById("nav-home")?.classList.add("nav-active");
  }
  else if (path === "jobs.html") {
    document.getElementById("nav-jobs")?.classList.add("nav-active");
  }
  else if (path === "alumni.html") {
    document.getElementById("nav-alumni")?.classList.add("nav-active");
  }

});
</script>

</body>
</html>
